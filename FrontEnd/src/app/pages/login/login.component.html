<mat-card class="auth-card">
  <mat-card-content>
    <form>
      <mat-form-field appearance="outline">
        <mat-label>Usuário</mat-label>
        <input matInput type="text" placeholder="Digite seu usuário">
        <mat-error>Este campo é obrigatório</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" placeholder="Digite sua senha">
        <mat-error>Senha inválida</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">
        Entrar
      </button>

      <div class="hint">
        <span>Não tem uma conta? </span>
        <a routerLink="/register">Cadastre-se</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
